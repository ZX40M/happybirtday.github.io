<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #e9d5ff, #d8b4f8);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* กล่องอยู่บนสุด */
.box {
  position: relative;
  z-index: 2;

  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
  color: #a855f7;
}

input {
  padding: 10px;
  width: 200px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #c084fc;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

#msg {
  margin-top: 10px;
  color: #a855f7;
}

/* เอฟเฟกต์อยู่ข้างหลัง */
.emoji {
  position: absolute;
  bottom: -20px;
  font-size: 24px;
  animation: rise linear forwards;
  z-index: 0;           /* 👈 อยู่หลัง */
  pointer-events: none; /* 👈 กดทะลุได้ */
}

@keyframes rise {
  to {
    transform: translateY(-100vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="box">
  <h2>ก่อนเข้าตอบให้ถูกก่อนน 💜</h2>
  <p>วันนี้วันอะไรคะ?</p>

  <input id="answer" placeholder="พิมพ์คำตอบ">
  <br>
  <button onclick="check()">ไปต่อ</button>

  <p id="msg"></p>
</div>

<script>
function check() {
  let ans = document.getElementById("answer").value.trim();

  if(ans === "วันเกิดเค้า") {
    window.location.href = "main.html";
  } else {
    document.getElementById("msg").innerText = "ผิดครับไอ้หมา";
  }
}

// เอฟเฟกต์ลอยอยู่ข้างหลัง
const emojis = ["💜","✨","🎉"];

setInterval(() => {
  const e = document.createElement("div");
  e.className = "emoji";
  e.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

  e.style.left = Math.random() * 100 + "vw";
  e.style.fontSize = (Math.random() * 20 + 20) + "px";
  e.style.animationDuration = (Math.random() * 2 + 2) + "s";

  document.body.appendChild(e);

  setTimeout(() => e.remove(), 4000);
}, 300);
</script>

</body>
</html>
