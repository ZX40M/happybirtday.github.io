<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💜</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #d8b4f8, #e9d5ff);
  color: white;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  padding: 25px 20px;
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
  animation: pop 1s ease;
}

img {
  width: 100%;
  max-width: 280px;
  height: auto;

  border-radius: 20px;
  margin-top: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  animation: float 3s ease-in-out infinite;
}

p {
  margin-top: 18px;
  font-size: 16px;
  line-height: 1.6;
}

button {
  margin-top: 22px;
  padding: 14px 22px;
  font-size: 16px;
  border: none;
  border-radius: 15px;
  background: white;
  color: #a855f7;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  background: #f3e8ff;
}

.heart {
  position: absolute;
  bottom: -20px;
  color: #f472b6;
  font-size: 18px;
  animation: rise 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
  0% { transform: scale(0.6); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes rise {
  0% {
    transform: translateY(0) translateX(0);
    opacity: 1;
  }
  100% {
    transform: translateY(-800px) translateX(40px);
    opacity: 0;
  }
}

@media (min-width: 768px) {
  h1 {
    font-size: 32px;
  }

  p {
    font-size: 18px;
  }

  button {
    font-size: 18px;
    padding: 16px 26px;
  }
}
</style>

</head>
<body>

<div class="container">
  <h1>🎂 Happy Birthday 💜</h1>

  <img src="time.jpg">

  <p>
    สุขสันต์วันเกิดนะคะไอ่หมาาา<br>
    สุขสันวันเกิดนะคะโตขึ้นอีกปีแล้ววว <br>
    ปีนี้เป็นปีแรกเลยที่ได้แฮปๆธาม <br>
    มีความสุขมากๆๆน้าไอ่อ้วนน <br>
    เค้ารักธามมากๆนะคะ อยู่ไปกะเค้าให้เค้าแฮปทุกปีเลยนะคะไอ่หมา
  </p>

  <button onclick="goGift()">🎁 เปิดของขวัญ</button>
</div>

<script>
function goGift() {
  window.location.href = "gift.html";
}

setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💜";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 16 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
